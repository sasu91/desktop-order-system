name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Annulla run precedenti sulla stessa branch/PR per risparmiare minuti
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Job 1 — Desktop / backend Python
# ---------------------------------------------------------------------------
jobs:
  backend:
    name: Python ${{ matrix.python-version }} smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # report both versions even if one fails
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend (editable)
        run: |
          python -m pip install --upgrade pip
          # Core package + API extras
          pip install -e backend[api]
          # Test utilities: httpx is required by Starlette TestClient
          pip install pytest pytest-cov httpx
          # Linter (light — E and F rules only)
          pip install "ruff>=0.4"

      - name: Smoke — dos_backend.smoke
        # Verifica che il package si importi e che la catena domain→persistence sia integra
        run: python -m dos_backend.smoke

      - name: Lint — ruff (E + F rules, new modules only)
        # Scoped to api/routers/schemas (new code) — avoids noise from 90+ legacy violations.
        # Fails on: undefined names (F821), unused imports (F401), obvious errors (E).
        # E501 (line length) and some comparison operators ignored for compatibility.
        run: |
          ruff check \
            backend/dos_backend/api/ \
            backend/dos_backend/routers/ \
            backend/dos_backend/schemas.py \
            --config backend/pyproject.toml \
            --select E,F \
            --ignore E501,E711,E712,E721,E741

      - name: Integration tests — TestClient + temp SQLite
        # These tests MUST pass: they cover the base scenario for every endpoint.
        # Exit code ≠ 0 fails the whole CI job.
        working-directory: backend
        run: |
          python -m pytest tests/ -v --tb=short

      - name: OpenAPI schema — verify docs/openapi.json is up to date
        # Regenerates the schema from the live app and diffs it against the
        # committed docs/openapi.json.  Fails with a unified diff if they differ.
        # To fix: run `python tools/export_openapi.py` locally and commit the result.
        run: python tools/export_openapi.py --check

      - name: Legacy test collection (non-blocking)
        # Raccoglie i vecchi test senza eseguirli: verifica sintassi/import.
        # Non bloccante (|| true) per test radice che dipendono dal contesto desktop.
        run: |
          python -m pytest --collect-only -q \
            --ignore=tests/test_db_concurrency_fase7.py \
            || true

