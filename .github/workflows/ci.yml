name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Annulla run precedenti sulla stessa branch/PR per risparmiare minuti
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Job 1 — Desktop / backend Python
# ---------------------------------------------------------------------------
jobs:
  backend:
    name: Python smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend (editable)
        run: |
          python -m pip install --upgrade pip
          # Installa dos_backend come pacchetto editable con tutte le dipendenze API
          pip install -e backend[api]
          # Dipendenze di testing
          pip install pytest pytest-cov

      - name: Smoke — dos_backend.smoke
        # Verifica che il package si importi e che la catena domain→persistence sia integra
        run: python -m dos_backend.smoke

      - name: Smoke — pytest collect-only
        # Raccoglie i test senza eseguirli: verifica sintassi/import di tutti i file di test.
        # Non fallisce se non ci sono test (exit code 5 → success grazie a --co).
        run: |
          python -m pytest --collect-only -q \
            --ignore=tests/test_db_concurrency_fase7.py \
            || true

